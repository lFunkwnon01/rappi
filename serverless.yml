service: popeyes-order-management-backend
frameworkVersion: "3"
useDotenv: true

plugins:
  - serverless-python-requirements

custom:
  stage: ${opt:stage, env:STAGE, 'dev'}
  region: ${opt:region, env:REGION, 'us-east-1'}
  usersTableName: popeyes-users-${self:custom.stage}
  productsTableName: popeyes-products-${self:custom.stage}
  storesTableName: popeyes-stores-${self:custom.stage}
  ordersTableName: popeyes-orders-${self:custom.stage}
  workflowTasksTableName: popeyes-workflow-tasks-${self:custom.stage}
  orderEventsTableName: popeyes-order-events-${self:custom.stage}
  eventBusName: popeyes-orders-bus-${self:custom.stage}
  pythonRequirements:
    dockerizePip: false
    slim: false
    pythonBin: /home/lFunknown/.local/share/mise/installs/python/3.11/bin/python3.11

provider:
  name: aws
  runtime: python3.11
  stage: ${self:custom.stage}
  region: ${self:custom.region}
  memorySize: 512
  timeout: 29
  logRetentionInDays: 14
  versionFunctions: false
  iam:
    # AWS Academy Lab: usar LabRole pre-existente (el lab no permite iam:CreateRole)
    role: arn:aws:iam::227165337884:role/LabRole
  environment:
    STAGE: ${self:custom.stage}
    REGION: ${self:custom.region}
    JWT_SECRET: ${env:JWT_SECRET, 'change-this-secret'}
    RAPPI_API_KEY: ${env:RAPPI_API_KEY, 'change-this-rappi-key'}
    RAPPI_STATUS_API_URL: ${env:RAPPI_STATUS_API_URL, ''}
    EVENT_BUS_NAME: ${self:custom.eventBusName}
    USERS_TABLE: ${self:custom.usersTableName}
    PRODUCTS_TABLE: ${self:custom.productsTableName}
    STORES_TABLE: ${self:custom.storesTableName}
    ORDERS_TABLE: ${self:custom.ordersTableName}
    WORKFLOW_TASKS_TABLE: ${self:custom.workflowTasksTableName}
    ORDER_EVENTS_TABLE: ${self:custom.orderEventsTableName}
    ASSETS_BUCKET: !Ref AssetsBucket
    # ORDER_WORKFLOW_ARN removido: state machine no se deploya en este lab
    # Ver DEPLOY_REPORT.md para el workaround.
  httpApi:
    cors:
      allowedOrigins:
        - http://localhost:5173
        - http://localhost:3000
        - "*"
      allowedHeaders:
        - Content-Type
        - Authorization
        - x-api-key
      allowedMethods:
        - GET
        - POST
        - OPTIONS
      allowCredentials: false
    authorizers:
      lambdaAuthorizer:
        type: request
        functionName: authorizer
        enableSimpleResponses: true
        resultTtlInSeconds: 0
        identitySource:
          - $request.header.Authorization

package:
  individually: true
  patterns:
    - '!node_modules/**'
    - '!venv/**'
    - '!__pycache__/**'
    - '!.pytest_cache/**'
    - '!package-lock.json'
    - '!README.md'
    - '!events/**'

functions:
  authorizer:
    handler: src/functions/authorizer/handler.lambda_handler
    description: Lambda authorizer for custom JWT validation
    memorySize: 256
    timeout: 10

  health:
    handler: src/functions/health/handler.lambda_handler
    description: Health endpoint
    events:
      - httpApi:
          path: /health
          method: GET

  auth:
    handler: src/functions/auth/handler.lambda_handler
    description: Authentication service
    events:
      - httpApi:
          path: /auth/register
          method: POST
      - httpApi:
          path: /auth/login
          method: POST
      - httpApi:
          path: /auth/me
          method: GET
          authorizer:
            name: lambdaAuthorizer

  catalog:
    handler: src/functions/catalog/handler.lambda_handler
    description: Catalog service
    events:
      - httpApi:
          path: /products
          method: GET
          authorizer:
            name: lambdaAuthorizer
      - httpApi:
          path: /products
          method: POST
          authorizer:
            name: lambdaAuthorizer
      - httpApi:
          path: /stores
          method: GET
          authorizer:
            name: lambdaAuthorizer
      - httpApi:
          path: /stores
          method: POST
          authorizer:
            name: lambdaAuthorizer

  orders:
    handler: src/functions/orders/handler.lambda_handler
    description: Orders service
    events:
      - httpApi:
          path: /orders
          method: POST
          authorizer:
            name: lambdaAuthorizer
      - httpApi:
          path: /orders/rappi
          method: POST
      - httpApi:
          path: /orders
          method: GET
          authorizer:
            name: lambdaAuthorizer
      - httpApi:
          path: /orders/{orderId}
          method: GET
          authorizer:
            name: lambdaAuthorizer

  tasks:
    handler: src/functions/tasks/handler.lambda_handler
    description: Workflow task service
    events:
      - httpApi:
          path: /tasks
          method: GET
          authorizer:
            name: lambdaAuthorizer
      - httpApi:
          path: /tasks/{taskId}/complete
          method: POST
          authorizer:
            name: lambdaAuthorizer

  dashboard:
    handler: src/functions/dashboard/handler.lambda_handler
    description: Dashboard service
    events:
      - httpApi:
          path: /dashboard/summary
          method: GET
          authorizer:
            name: lambdaAuthorizer

  adminSeed:
    handler: src/functions/admin/handler.lambda_handler
    description: Admin seed service
    events:
      - httpApi:
          path: /admin/seed
          method: POST
          authorizer:
            name: lambdaAuthorizer

  # Workflow + EventBridge rule + Step Functions state machine
  # están comentados porque requieren roles IAM custom que el AWS Academy
  # Lab no permite crear. Ver DEPLOY_REPORT.md.
  # createHumanTask, updateOrderStatus, closeOrder, notifyRappiStatus:
  #   requieren un role con lambda:InvokeFunction + events:PutEvents
  #   que no se puede crear con iam:CreateRole denegado.
  #   Se pueden simular con un dispatcher Lambda que lee de WorkflowTasks
  #   y avanza el estado manualmente.

resources:
  Resources:
    UsersTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.usersTableName}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: userId
            AttributeType: S
          - AttributeName: email
            AttributeType: S
        KeySchema:
          - AttributeName: userId
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: email-index
            KeySchema:
              - AttributeName: email
                KeyType: HASH
            Projection:
              ProjectionType: ALL

    ProductsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.productsTableName}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: tenantId
            AttributeType: S
          - AttributeName: productId
            AttributeType: S
        KeySchema:
          - AttributeName: tenantId
            KeyType: HASH
          - AttributeName: productId
            KeyType: RANGE

    StoresTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.storesTableName}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: tenantId
            AttributeType: S
          - AttributeName: storeId
            AttributeType: S
        KeySchema:
          - AttributeName: tenantId
            KeyType: HASH
          - AttributeName: storeId
            KeyType: RANGE

    OrdersTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.ordersTableName}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: tenantId
            AttributeType: S
          - AttributeName: orderId
            AttributeType: S
        KeySchema:
          - AttributeName: tenantId
            KeyType: HASH
          - AttributeName: orderId
            KeyType: RANGE

    WorkflowTasksTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.workflowTasksTableName}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: tenantId
            AttributeType: S
          - AttributeName: taskId
            AttributeType: S
          - AttributeName: orderId
            AttributeType: S
        KeySchema:
          - AttributeName: tenantId
            KeyType: HASH
          - AttributeName: taskId
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: orderId-index
            KeySchema:
              - AttributeName: orderId
                KeyType: HASH
            Projection:
              ProjectionType: ALL

    OrderEventsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.orderEventsTableName}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: tenantId
            AttributeType: S
          - AttributeName: eventId
            AttributeType: S
          - AttributeName: orderId
            AttributeType: S
        KeySchema:
          - AttributeName: tenantId
            KeyType: HASH
          - AttributeName: eventId
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: orderId-index
            KeySchema:
              - AttributeName: orderId
                KeyType: HASH
            Projection:
              ProjectionType: ALL

    OrdersEventBus:
      Type: AWS::Events::EventBus
      Properties:
        Name: ${self:custom.eventBusName}

    AssetsBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: !Sub "popeyes-assets-${self:custom.stage}-${AWS::AccountId}"
        PublicAccessBlockConfiguration:
          BlockPublicAcls: true
          BlockPublicPolicy: true
          IgnorePublicAcls: true
          RestrictPublicBuckets: true
        CorsConfiguration:
          CorsRules:
            - AllowedHeaders:
                - "*"
              AllowedMethods:
                - GET
                - PUT
                - POST
              AllowedOrigins:
                - http://localhost:5173
                - http://localhost:3000
                - "*"
  Outputs:
    HealthUrl:
      Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/health"
    EventBusName:
      Value: !Ref OrdersEventBus
    UsersTableName:
      Value: !Ref UsersTable
    ProductsTableName:
      Value: !Ref ProductsTable
    StoresTableName:
      Value: !Ref StoresTable
    OrdersTableName:
      Value: !Ref OrdersTable
    WorkflowTasksTableName:
      Value: !Ref WorkflowTasksTable
    OrderEventsTableName:
      Value: !Ref OrderEventsTable
    AssetsBucketName:
      Value: !Ref AssetsBucket
